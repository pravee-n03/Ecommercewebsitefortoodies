# Netlify Configuration for Toodies E-commerce Platform
# Optimized for React + Vite 6 + Tailwind v4 + Supabase

[build]
  command = "npm install && npm run build"
  # !! Must match vite.config.ts build.outDir !!
  publish = "build"

  [build.environment]
    NODE_VERSION = "20"
    # NOTE: Do NOT set NODE_ENV=production here — npm skips devDependencies
    # when NODE_ENV=production, which breaks the Vite/Tailwind build tools.
    # Vite automatically sets NODE_ENV=production inside the built output.
    CI = "false"
    SKIP_PREFLIGHT_CHECK = "true"
    # Force npm to install ALL dependencies including devDependencies
    NPM_FLAGS = "--include=dev"

# ─── Single Page Application routing ───────────────────────────────────────
# All routes must resolve to index.html so React Router handles navigation.
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ─── Cache: immutable hashed assets ────────────────────────────────────────
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ─── Cache: images ─────────────────────────────────────────────────────────
[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# ─── Security headers ───────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection       = "1; mode=block"
    Referrer-Policy        = "strict-origin-when-cross-origin"

# ─── Context overrides ──────────────────────────────────────────────────────
[context.production]
  command = "npm install && npm run build"

[context.deploy-preview]
  command = "npm install && npm run build"

[context.branch-deploy]
  command = "npm install && npm run build"

# ─── Local dev via Netlify Dev ──────────────────────────────────────────────
[dev]
  command    = "npm run dev"
  port       = 5173
  targetPort = 5173
  publish    = "dist"
  autoLaunch = false

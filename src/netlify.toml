# Netlify Configuration for Toodies E-commerce Platform
# Optimized for React + Vite 6 + Supabase

[build]
  command   = "npm run build"
  # !! Must match vite.config.ts build.outDir !!
  publish   = "dist"

  [build.environment]
    NODE_VERSION           = "20"
    NODE_ENV               = "production"
    # Prevent Netlify treating warnings as hard errors
    CI                     = "false"
    SKIP_PREFLIGHT_CHECK   = "true"

# ─── Single Page Application routing ───────────────────────────────────────
# All routes must resolve to index.html so React Router handles navigation.
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ─── Cache: immutable hashed assets ────────────────────────────────────────
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ─── Cache: images ─────────────────────────────────────────────────────────
[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# ─── Security headers ───────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options           = "DENY"
    X-Content-Type-Options    = "nosniff"
    X-XSS-Protection          = "1; mode=block"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "camera=(), microphone=(), geolocation=()"

# ─── CORS for Supabase API calls ────────────────────────────────────────────
[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin  = "*"
    Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization"

# ─── Build processing ───────────────────────────────────────────────────────
[build.processing]
  skip_processing = false

[build.processing.css]
  bundle  = true
  minify  = true

[build.processing.js]
  bundle  = true
  minify  = true

[build.processing.html]
  pretty_urls = true

[build.processing.images]
  compress = true

# ─── Context overrides ──────────────────────────────────────────────────────
[context.production]
  command = "npm run build"

[context.deploy-preview]
  command = "npm run build"

[context.branch-deploy]
  command = "npm run build"

# ─── Local dev via Netlify Dev ──────────────────────────────────────────────
[dev]
  command      = "npm run dev"
  port         = 5173
  targetPort   = 5173
  publish      = "dist"
  autoLaunch   = false
